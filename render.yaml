services:
  - type: web
    runtime: static
    name: aquawetrix-investor-demo
    rootDir: .
    buildCommand: npm ci && npm run build:core && npm run build:client
    staticPublishPath: apps/client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()
      - path: /*
        name: Content-Security-Policy
        value: >-
          default-src 'self'; img-src 'self' data: blob:; style-src 'self'
          'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src
          'self' data:; media-src 'self' blob:; object-src 'none'; base-uri
          'self'; form-action 'self'; frame-ancestors 'none'
